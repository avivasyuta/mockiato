<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mockiato Test Page</title>
    <script src="/dist/mockiato.js" id="mockiato_intercept_script" data-is-enabled="true"></script>
</head>
<body>
    <h1>Mockiato E2E Test Page</h1>
    <div id="status"></div>
    <button id="test-fetch">Test Fetch Request</button>
    <button id="test-xhr">Test XHR Request</button>
    <div id="results"></div>

    <script>
        // Test functions
        async function testFetch() {
            const resultsDiv = document.getElementById('results');
            try {
                const response = await fetch('https://jsonplaceholder.typicode.com/posts/1');
                const data = await response.json();
                resultsDiv.innerHTML += `<p>Fetch Response: ${JSON.stringify(data)}</p>`;
            } catch (error) {
                resultsDiv.innerHTML += `<p>Fetch Error: ${error.message}</p>`;
            }
        }

        function testXHR() {
            const resultsDiv = document.getElementById('results');
            const xhr = new XMLHttpRequest();
            xhr.open('GET', 'https://jsonplaceholder.typicode.com/posts/2');
            xhr.onload = function() {
                if (xhr.status === 200) {
                    const data = JSON.parse(xhr.responseText);
                    resultsDiv.innerHTML += `<p>XHR Response: ${JSON.stringify(data)}</p>`;
                }
            };
            xhr.onerror = function() {
                resultsDiv.innerHTML += `<p>XHR Error: ${xhr.statusText}</p>`;
            };
            xhr.send();
        }

        // Add event listeners
        document.getElementById('test-fetch').addEventListener('click', testFetch);
        document.getElementById('test-xhr').addEventListener('click', testXHR);
    </script>
</body>
</html>
